<style>
        body {
            background-color: #08080a; /* Darker than background for ambient depth */
            color: #e5e1e4;
        }
        
        /* Liquid Glass Material */
        .glass-panel {
            background: rgba(22, 22, 31, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.35);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);

            background: rgba(22, 22, 31, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* Ambient Blooms */
        .ambient-bloom {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }
        
        .bloom-1 {
            top: -10%;
            left: 20%;
            width: 40vw;
            height: 40vw;
            background: #046dd9; /* secondary-container */
        }

        .bloom-2 {
            bottom: 10%;
            right: 10%;
            width: 50vw;
            height: 50vw;
            background: #1a1b1f;
        }

        /* Connecting Lines */
        .tech-line {
            stroke: rgba(255, 255, 255, 0.15);
            stroke-width: 1.5;
            stroke-dasharray: 4;
            animation: dash 20s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -100;
            }
        }
        
        .tech-line-error {
             stroke: #ffb4ab;
             stroke-width: 1.5;
             stroke-dasharray: 4;
        }

        /* Node Pulse */
        .node-pulse {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(4, 109, 217, 0.4);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(4, 109, 217, 0);
            }
            100% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(4, 109, 217, 0);
            }
        }
        
        /* Node Pulse Error */
        .node-pulse-error {
            animation: pulse-ring-error 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        @keyframes pulse-ring-error {
            0% {

                box-shadow: 0 0 0 0 rgba(255, 180, 171, 0);
