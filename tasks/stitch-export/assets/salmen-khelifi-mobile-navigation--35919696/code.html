<style>
        body {
            /* Simulate scroll lock */
            overflow: hidden;
            background-color: #08080a; /* Base dark from brand */
        }
        
        .liquid-glass {
            background-color: rgba(19, 19, 21, 0.7); /* Background with opacity */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.35); /* glass-border-bright equivalent for highlight */
            border-left: 1px solid rgba(255,255,255,0.14); /* glass-border-muted */
            border-right: 1px solid rgba(255,255,255,0.14);
            border-bottom: 1px solid rgba(255,255,255,0.14);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-primary font-body-reg antialiased selection:bg-secondary-container selection:text-white h-screen flex justify-center items-center">
<!-- Container to simulate mobile width (390px) for preview purposes -->
<div class="relative w-[390px] h-[844px] bg-[#08080a] overflow-hidden rounded-[40px] border-[8px] border-surface-container shadow-2xl flex flex-col">
<!-- Mock background content to show blur effect -->
<div class="absolute inset-0 p-8 flex flex-col gap-6 opacity-40">
<div class="w-full h-32 rounded-2xl bg-surface-variant/50"></div>
<div class="w-3/4 h-8 rounded-lg bg-surface-variant/50"></div>
<div class="w-full h-64 rounded-2xl bg-surface-variant/50"></div>
</div>
<!-- Ambient Bloom Behind Nav -->
<div class="absolute top-0 right-0 w-64 h-64 bg-secondary-container opacity-[0.15] rounded-full blur-[80px] pointer-events-none transform translate-x-1/2 -translate-y-1/2"></div>
<div class="absolute bottom-0 left-0 w-64 h-64 bg-secondary-fixed-dim opacity-[0.1] rounded-full blur-[80px] pointer-events-none transform -translate-x-1/2 translate-y-1/2"></div>
<!-- FULL SCREEN NAV OVERLAY -->
<div class="absolute inset-0 z-50 liquid-glass flex flex-col px-margin-mobile py-[env(safe-area-inset-top,24px)] pb-margin-mobile">
<!-- Header Row -->
<div class="flex justify-between items-center h-20 mb-stack-md flex-shrink-0">
<!-- Brand Logo from JSON -->
<a class="font-h3 text-h3 font-bold text-primary flex items-baseline" href="#">
                    Khelifi<span class="text-secondary-container">.</span>
</a>
<!-- Close Control -->
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container/50 hover:bg-surface-variant transition-colors border border-glass-border-muted text-on-surface hover:text-primary active:scale-95 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300;">close</span>
</button>
</div>
<!-- Navigation Links -->
<nav class="flex-1 flex flex-col justify-center gap-6 px-4 overflow-y-auto pb-stack-md hide-scrollbar">
<!-- Home (Current Page Indicator) -->
<a class="group flex items-center gap-4 text-h2-mobile font-h2-mobile font-bold text-secondary-container transition-transform active:scale-[0.98]" href="#">
<span class="w-2 h-2 rounded-full bg-secondary-container group-hover:scale-150 transition-transform"></span>
                    Home
                </a>
<!-- Other Links -->
<a class="group flex items-center gap-4 text-h2-mobile font-h2-mobile font-semibold text-on-surface-variant hover:text-primary transition-colors active:scale-[0.98]" href="#">
<span class="w-2 h-2 rounded-full bg-transparent group-hover:bg-primary/50 transition-colors"></span>
                    Work
                </a>
<a class="group flex items-center gap-4 text-h2-mobile font-h2-mobile font-semibold text-on-surface-variant hover:text-primary transition-colors active:scale-[0.98]" href="#">
<span class="w-2 h-2 rounded-full bg-transparent group-hover:bg-primary/50 transition-colors"></span>
                    Capabilities
                </a>
<a class="group flex items-center gap-4 text-h2-mobile font-h2-mobile font-semibold text-on-surface-variant hover:text-primary transition-colors active:scale-[0.98]" href="#">
<span class="w-2 h-2 rounded-full bg-transparent group-hover:bg-primary/50 transition-colors"></span>
                    Process
                </a>
<a class="group flex items-center gap-4 text-h2-mobile font-h2-mobile font-semibold text-on-surface-variant hover:text-primary transition-colors active:scale-[0.98]" href="#">
<span class="w-2 h-2 rounded-full bg-transparent group-hover:bg-primary/50 transition-colors"></span>
                    About
                </a>
<a class="group flex items-center gap-4 text-h2-mobile font-h2-mobile font-semibold text-on-surface-variant hover:text-primary transition-colors active:scale-[0.98]" href="#">
<span class="w-2 h-2 rounded-full bg-transparent group-hover:bg-primary/50 transition-colors"></span>
                    Contact
                </a>
<a class="group flex items-center gap-4 text-h2-mobile font-h2-mobile font-semibold text-on-surface-variant hover:text-primary transition-colors active:scale-[0.98]" href="#">
<span class="w-2 h-2 rounded-full bg-transparent group-hover:bg-primary/50 transition-colors"></span>
                    Résumé
                </a>
</nav>

<div class="mt-auto pt-stack-sm border-t border-glass-border-muted flex-shrink-0">
<button class="w-full flex items-center justify-center gap-2 bg-secondary-container hover:bg-secondary-container/90 text-primary font-body-reg font-semibold py-4 px-6 rounded-full shadow-[0_0_20px_rgba(4,109,217,0.3)] transition-all active:scale-[0.97]">
                    Start a Project
                    <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'wght' 500;">arrow_forward</span>
</button>
</div>
</div>
</div>
<style>
        /* Hide scrollbar for nav links if they overflow */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
