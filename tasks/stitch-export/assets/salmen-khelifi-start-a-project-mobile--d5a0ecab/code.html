<style>
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.35);
        }
        .liquid-glass-input {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .liquid-glass-input:focus {
            outline: none;
            border-color: #2f80ed;
            box-shadow: 0 0 0 1px #2f80ed, 0 0 15px rgba(47,128,237,0.15);
        }
        
        /* Ambient Background Blooms */
        .ambient-bloom {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
        }
        .bloom-1 {
            top: -10%;
            left: -20%;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(4,109,217,0.4) 0%, rgba(19,19,21,0) 70%);
        }
        .bloom-2 {
            bottom: 20%;
            right: -30%;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(138,43,226,0.2) 0%, rgba(19,19,21,0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen relative overflow-x-hidden selection:bg-secondary-container selection:text-white">
<!-- Ambient Background -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="ambient-bloom bloom-1"></div>
<div class="ambient-bloom bloom-2"></div>
</div>
<!-- Top Navigation (Suppressed per instructions for task-focused/transactional page, but leaving a minimal header to return) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile py-4 bg-surface/80 backdrop-blur-xl border-b border-glass-border-muted shadow-sm md:px-margin-desktop md:hidden">
<div class="font-h3 text-h3 font-bold text-primary">Khelifi<span class="text-secondary-container">.</span></div>
<a class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center w-10 h-10 rounded-full bg-white/5 active:scale-95" href="#">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
</a>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-container-max mx-auto px-margin-mobile pt-24 pb-stack-lg min-h-screen flex flex-col md:px-margin-desktop md:pt-32">
<!-- Header Section -->
<div class="mb-stack-md animate-fade-in-up">
<div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full liquid-glass mb-4">
<span class="w-1.5 h-1.5 rounded-full bg-secondary-container"></span>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Available for Projects</span>
</div>
<h1 class="font-h1-mobile text-h1-mobile text-primary mb-2 md:font-h1 md:text-h1">Start a Project.</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Tell me about your architectural or engineering needs. Let's build something refined.</p>
</div>
<!-- Form Area -->
<form class="flex flex-col gap-stack-sm w-full animate-fade-in-up" style="animation-delay: 0.1s;">
<!-- Bento Box Wrapper for Form Fields -->
<div class="liquid-glass rounded-glass p-margin-mobile flex flex-col gap-unit shadow-lg">
<!-- Personal Info -->
<div class="flex flex-col gap-2 mb-4">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="name">Full Name *</label>
<input class="liquid-glass-input w-full h-touch rounded-input px-4 text-primary font-body-reg placeholder:text-text-dim transition-all duration-300" id="name" name="name" placeholder="Jane Doe" required="" type="text"/>
</div>
<div class="flex flex-col gap-2 mb-4">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="email">Email Address *</label>
<input class="liquid-glass-input w-full h-touch rounded-input px-4 text-primary font-body-reg placeholder:text-text-dim transition-all duration-300" id="email" name="email" placeholder="jane@company.com" required="" type="email"/>
</div>
<!-- Project Type Selection (Radio Group styled as chips) -->
<div class="flex flex-col gap-2 mb-4">
<label class="font-label-caps text-label-caps text-on-surface-variant">Project Type</label>
<div class="flex flex-wrap gap-2">
<label class="relative cursor-pointer">
<input checked="" class="peer sr-only" name="project_type" type="radio" value="design"/>
<div class="liquid-glass-input px-4 py-2 rounded-full font-body-reg text-body-reg text-on-surface-variant peer-checked:bg-secondary-container peer-checked:text-white peer-checked:border-secondary-container transition-all">
                                Design System
                            </div>
</label>
<label class="relative cursor-pointer">
<input class="peer sr-only" name="project_type" type="radio" value="engineering"/>
<div class="liquid-glass-input px-4 py-2 rounded-full font-body-reg text-body-reg text-on-surface-variant peer-checked:bg-secondary-container peer-checked:text-white peer-checked:border-secondary-container transition-all">
                                Full-Stack App
                            </div>
</label>
<label class="relative cursor-pointer">
<input class="peer sr-only" name="project_type" type="radio" value="automation"/>
<div class="liquid-glass-input px-4 py-2 rounded-full font-body-reg text-body-reg text-on-surface-variant peer-checked:bg-secondary-container peer-checked:text-white peer-checked:border-secondary-container transition-all">
                                Architecture
                            </div>
</label>
</div>
</div>
<!-- Budget Selection -->
<div class="flex flex-col gap-2 mb-4">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="budget">Estimated Budget</label>
<div class="relative">
<select class="liquid-glass-input w-full h-touch rounded-input px-4 appearance-none text-primary font-body-reg transition-all duration-300 bg-transparent focus:bg-surface-elevated" id="budget" name="budget">
<option class="text-text-dim bg-surface" disabled="" selected="" value="">Select a range</option>
<option class="bg-surface" value="10k">&lt; $10k</option>
<option class="bg-surface" value="10k-50k">$10k - $50k</option>
<option class="bg-surface" value="50k+">$50k+</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Project Details -->
<div class="flex flex-col gap-2 mb-2">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="details">Project Details</label>
<textarea class="liquid-glass-input w-full rounded-input p-4 text-primary font-body-reg placeholder:text-text-dim transition-all duration-300 resize-none" id="details" name="details" placeholder="Describe the core architecture, goals, and any specific technical requirements..." rows="4"></textarea>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-touch mt-4 bg-secondary-container hover:bg-opacity-90 text-white font-body-reg text-body-reg font-semibold rounded-full flex items-center justify-center gap-2 transition-all duration-300 active:scale-95 shadow-[0_0_15px_rgba(47,128,237,0.15)] group relative overflow-hidden" type="submit">
<span class="relative z-10">Submit Inquiry</span>
<span class="material-symbols-outlined relative z-10 group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Secondary Actions -->
<div class="mt-stack-md flex flex-col items-center gap-4 animate-fade-in-up" style="animation-delay: 0.2s;">
<p class="font-label-caps text-label-caps text-on-surface-variant text-center">Or reach out directly</p>
<div class="flex gap-4 w-full justify-center">
<a class="flex-1 max-w-[160px] h-touch flex items-center justify-center gap-2 liquid-glass rounded-full text-on-surface-variant hover:text-primary transition-colors hover:bg-white/5 active:scale-95" href="mailto:hello@khelifi.com">
<span class="material-symbols-outlined text-[18px]" data-icon="mail">mail</span>
<span class="font-body-reg text-sm font-semibold">Email Me</span>
</a>
<a class="flex-1 max-w-[160px] h-touch flex items-center justify-center gap-2 liquid-glass rounded-full text-on-surface-variant hover:text-primary transition-colors hover:bg-white/5 active:scale-95" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="calendar_month">calendar_month</span>
<span class="font-body-reg text-sm font-semibold">Book a Call</span>
</a>
</div>
</div>
</main>
<style>
        /* Simple entry animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
    </style>
</body></html>
